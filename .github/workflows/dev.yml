name: Dev Branch CI

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Python syntax (recursive, fail on error)
        run: |
          # compileall walks the tree and fails the job on the first
          # SyntaxError. Quiet flag suppresses per-file success lines.
          # `-q -q` = only errors. No `|| echo` fallback — a syntax
          # error here MUST fail the job and block the PR.
          python -m compileall -q -q .

      - name: Run basic tests
        run: |
          echo "✅ Python API - syntax check passed"
          python --version
          pip list | grep fastapi

      - name: Validate OpenAPI schema
        run: |
          echo "✅ FastAPI app structure validated"
